<!DOCTYPE html>
<html lang="zh-CN">
<head>

<body>
<div class="page-num">02</div>
<div class="slide-main">
  <h1 style="font-size:56px">为什么慢？为什么不稳？</h1>
  <p class="subtitle">手动 + 聊天式辅助，都有硬伤</p>
  <div class="cols-2">
    <div class="sketch-box" style="background:var(--peach)">
      <h2>🖥️ 手动科研</h2>
      <ul>
        <li>十几个标签页、PDF、笔记乱飞</li>
        <li>搜文献、筛选、搭结构来回切换</li>
        <li>慢、碎、靠记忆</li>
      </ul>
    </div>
    <div class="sketch-box" style="background:var(--blue)">
      <h2>💬 聊天式辅助</h2>
      <ul>
        <li>问一句、回一段——快</li>
        <li>是「回答器」，不是研究流程</li>
        <li>同一轮对话里「看起来像对的」</li>
        <li><strong>快，但不稳</strong></li>
      </ul>
    </div>
  </div>
</div>
